<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mission Control AI</title>
<style>
body{font-family:system-ui,sans-serif;max-width:680px;margin:2rem auto;padding:0 1rem}
h2{font-size:17px;margin-bottom:1rem}
table{width:100%;border-collapse:collapse;margin-bottom:1rem;font-size:14px}
td,th{padding:8px 12px;border:1px solid #ddd;text-align:left}
th{background:#f5f5f5;font-weight:600;font-size:12px;color:#555}
.chat{border:1px solid #ddd;border-radius:6px;padding:1rem;min-height:120px;background:#fafafa}
.msg{margin-bottom:10px;padding:8px 12px;border-radius:6px;font-size:14px;line-height:1.5;white-space:pre-wrap}
.msg.user{background:#dbeafe}
.msg.bot{background:#f0f0f0}
.role{font-size:10px;color:#888;margin-bottom:3px}
.hint{color:#aaa;font-size:13px;text-align:center;padding:2rem 0}
.top{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.sec{background:#e5e7eb;color:#333;padding:6px 12px;border:none;border-radius:6px;cursor:pointer;font-size:13px}
.sec:disabled{background:#ccc;cursor:default}
.tempo{font-size:12px;color:#aaa}
</style>
</head>
<body>

<h2>🚀 Mission Control AI / GS-2026 🚀</h2>

<div class="top">
  <button class="sec" id="btn" onclick="fetchDados()">Atualizar dados</button>
  <button class="sec" id="btn-ia" onclick="analisarComIA()" style="display:none">Analisar com IA</button>
  <span class="tempo" id="hora"></span>
</div>

<table id="tabela">
  <tr><th colspan="2"><span class="hint">Clique em "Atualizar dados" para buscar a telemetria.</span></th></tr>
</table>

<div class="chat" id="chat"><div class="hint">Clique em "Atualizar Dados" e depois em "Analisar com IA".</div></div>

<script>
const OLLAMA  = 'http://srv1596774.hstgr.cloud:11434/api/chat';
const WEBHOOK = 'https://n8n.srv1596774.hstgr.cloud/webhook/75fee53b-0871-4218-bc0a-d50067f55b61';
const MODELO  = 'AstroData';

const SYSTEM = {
  role:'system',
  content:`Voce e AstroData, assistente de monitoramento de missoes espaciais criada por Joao Vitor Belchior e Gabriel Pedro.
Responda SEMPRE em portugues. Nunca invente dados. Use APENAS os valores recebidos.

REGRAS DE CLASSIFICACAO:
TEMPERATURA (C): NORMAL=18 a 30 | ATENCAO=31 a 35 ou abaixo de 18 | CRITICO=acima de 35
COMUNICACAO (%): NORMAL=60+ | ATENCAO=30 a 59 | CRITICO=abaixo de 30
BATERIA (%): NORMAL=50+ | ATENCAO=20 a 49 | CRITICO=abaixo de 20
COMBUSTIVEL (%): NORMAL=40+ | ATENCAO=15 a 39 | CRITICO=abaixo de 15
OXIGENIO (%): NORMAL=85+ | ATENCAO=75 a 84 | CRITICO=abaixo de 75
ESTABILIDADE (%): NORMAL=70+ | ATENCAO=40 a 69 | CRITICO=abaixo de 40

STATUS: 1+ CRITICO=MISSAO EM ESTADO CRITICO | 1+ ATENCAO=MISSAO EM ATENCAO | tudo normal=MISSAO ESTAVEL

Responda SEMPRE neste formato (texto simples, sem markdown, sem emojis):

AstroData na area! Aqui vai o resumo do foguete [nome]:

============================================================
MISSION CONTROL AI - STATUS DA MISSAO
============================================================
Foguete : [nome]
Distancia : [valor] km
Temperatura : [valor]C
Comunicacao : [valor]%
Bateria : [valor]%
Combustivel : [valor]%
Oxigenio : [valor]%
Estabilidade : [valor]%
------------------------------------------------------------
ALERTAS:
[Liste TODOS os parametros CRITICO ou ATENCAO com o limite. Se nenhum: - Nenhum alerta operacional identificado.]
------------------------------------------------------------
RESUMO OPERACIONAL:
[Resumo curto e tecnico.]
------------------------------------------------------------
RECOMENDACOES:
[Acoes praticas. Se tudo normal: - Manter monitoramento padrao.]

Estou aqui para manter seu foguete seguro
Treinada por Joao Vitor Belchior e Gabriel Pedro`
};

let tel = null;

const nomes = {
  nome_foguete:'Foguete', atualizado_em:'Atualizado em',
  distancia_km:'Distancia da Terra (km)', temperatura:'Temperatura (C)',
  comunicacao:'Comunicacao (%)', bateria:'Bateria (%)',
  combustivel:'Combustivel (%)', oxigenio:'Oxigenio (%)',
  estabilidade:'Estabilidade (%)'
};

async function fetchDados() {
  const btn = document.getElementById('btn');
  btn.disabled = true; btn.textContent = 'Buscando...';
  try {
    const r = await fetch(WEBHOOK,{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
    tel = await r.json();
    if (Array.isArray(tel)) tel = tel[0];
    const campos = Object.keys(nomes).filter(c => tel[c] !== undefined);
    document.getElementById('tabela').innerHTML =
      '<tr><th>Parametro</th><th>Valor</th></tr>' +
      campos.map(c => '<tr><td>'+nomes[c]+'</td><td>'+tel[c]+'</td></tr>').join('');
    document.getElementById('btn-ia').style.display = 'inline-block';
    document.getElementById('hora').textContent = 'Atualizado as ' + new Date().toLocaleTimeString('pt-BR');
  } catch(e) {
    document.getElementById('tabela').innerHTML = '<tr><td style="color:red">Erro: '+e.message+'</td></tr>';
  }
  btn.disabled = false; btn.textContent = 'Atualizar dados';
}

async function analisarComIA() {
  if (!tel) return;
  const btnIa = document.getElementById('btn-ia');
  btnIa.disabled = true; btnIa.textContent = 'Analisando...';

  const campos = Object.keys(nomes).filter(c => tel[c] !== undefined && c !== 'nome_foguete' && c !== 'atualizado_em');
  const linhas = campos.map(c => '- '+nomes[c]+': '+tel[c]).join('\n');
  const nome = tel.nome_foguete || 'Foguete nao identificado';
  const prompt = 'Analise a telemetria do foguete '+nome+':\n'+linhas+'\n\nAvalie o status e de recomendacoes operacionais.';

  const chat = document.getElementById('chat');
  chat.innerHTML =
    '<div class="msg user"><div class="role">Voce</div>'+prompt+'</div>' +
    '<div class="msg bot"><div class="role">AstroData</div><span id="resp">AstroData esta montando sua analise...</span></div>';
  const resp = document.getElementById('resp');

  let texto = '';
  try {
    const res = await fetch(OLLAMA,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({model: MODELO, messages: [SYSTEM, {role:'user', content: prompt}], stream: true})
    });
    const reader = res.body.getReader(), dec = new TextDecoder();
    while (true) {
      const r = await reader.read();
      if (r.done) break;
      const linhasResp = dec.decode(r.value).split('\n');
      for (let i = 0; i < linhasResp.length; i++) {
        if (!linhasResp[i]) continue;
        try {
          const j = JSON.parse(linhasResp[i]);
          if (j.message && j.message.content) { texto += j.message.content; resp.textContent = texto; }
        } catch(e) {}
      }
    }
  } catch(e) {
    resp.textContent = 'Erro ao conectar com a IA: ' + e.message;
  }

  btnIa.disabled = false; btnIa.textContent = 'Analisar com IA';
}
</script>
</body>
</html>
